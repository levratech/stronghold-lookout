when:
  - event: [push, pull_request]

steps:
  go-test:
    image: golang:1.25
    commands:
      - go test ./...

  web-build:
    image: node:24-alpine
    commands:
      - cd web
      - npm ci
      - npm run build

  package-linux-amd64:
    image: golang:1.25
    depends_on: [go-test, web-build]
    commands:
      - mkdir -p dist
      - GOOS=linux GOARCH=amd64 go build -o dist/lookout-linux-amd64 ./cmd/lookout
      - mkdir -p dist/web
      - cp -R web/dist/. dist/web/
      - tar -czf dist/stronghold-lookout-linux-amd64.tar.gz -C dist lookout-linux-amd64 web

  publish-artifacts:
    image: alpine:3.20
    depends_on: [package-linux-amd64]
    when:
      - event: push
        branch: main
    commands:
      - SHORT_SHA="$(printf '%s' "${CI_COMMIT_SHA:-manual}" | cut -c1-12)"
      - DEST="/srv/artifacts/stronghold-lookout/$SHORT_SHA"
      - mkdir -p "$DEST"
      - cp dist/stronghold-lookout-linux-amd64.tar.gz "$DEST/"
      - ln -sfn "$SHORT_SHA" /srv/artifacts/stronghold-lookout/latest
